{% set name = "django-large-image" %}
{% set version = "0.10.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: e8cce1526b98a1934de2f4cac1854fa2491339d169bcb500cec9085e20ab15fd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - django
    - djangorestframework
    - drf-spectacular
    - filelock
    - large-image >=1.15
    - python >={{ python_min }}

test:
  imports:
    - django_large_image
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/girder/django-large-image
  license: Apache-2.0
  license_file: LICENSE
  summary: Dynamic tile server in Django built on top of large-image (and GDAL)
  description: |
    django-large-image is an abstraction of large-image for use with
    django-rest-framework providing viewset mixins for endpoints to work with
    large images (Cloud Optimized GeoTiffs or medical image formats) in Django.

extra:
  recipe-maintainers:
    - banesullivan
    - manthey
    - kwrobot
